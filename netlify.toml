[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

# Proxy API calls to backend (so frontend can call /api/... safely)
[[redirects]]
  from = "/api/*"
  to = "https://smart-notes-manager.onrender.com/api/:splat"
  status = 200
  force = true

# Single Page App (React) routing:
# If user refreshes /some-page, Netlify should still serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

